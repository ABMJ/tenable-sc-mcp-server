services:
  tenable-sc-mcp:
    image: tenable-sc-mcp:latest
    container_name: tenable-sc-mcp
    user: "${UID}:${GID}"
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ${HOME}/.tenable-sc-mcp.env:/config/tsc.env:ro
    command:
      - --transport
      - streamable-http
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --env-file
      - /config/tsc.env
      - --allow-remote-hosts
